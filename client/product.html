<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar">
    <div class="logo">ShopEasy</div>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="login.html">Login</a></li>
    </ul>
</nav>

<section class="product-details">

    <div class="product-image">
        <img
        id="productImage"
        src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500"
        alt="Product">
    </div>

    <div class="product-info">

        <h1 id="productName">
            Product Name
        </h1>

        <h2 id="productPrice">
            $0
        </h2>

        <p>
            High quality product available at ShopEasy.
            Fast delivery, secure payments and excellent customer support.
        </p>

        <button id="addToCartBtn">
            Add To Cart
        </button>

    </div>

</section>

<script>

const params = new URLSearchParams(window.location.search);

const name = params.get("name") || "Wireless Headphones";
const price = params.get("price") || "50";

document.getElementById("productName").innerText = name;
document.getElementById("productPrice").innerText = "$" + price;

const productImages = {

    "Wireless Headphones":
    "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500",

    "Smart Watch":
    "https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=500",

    "Gaming Mouse":
    "https://images.unsplash.com/photo-1527814050087-3793815479db?w=500",

    "Smartphone":
    "https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=500",

    "Laptop":
    "https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=500",

    "Running Shoes":
    "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500",

    "Luxury Watch":
    "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500",

    "Bluetooth Speaker":
    "https://images.unsplash.com/photo-1608043152269-423dbba4e7e1?w=500",

    "Gaming Keyboard":
    "https://images.unsplash.com/photo-1511467687858-23d96c32e4ae?w=500",

    "Backpack":
    "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=500",

    "Sports Shoes":
    "https://images.unsplash.com/photo-1543508282-6319a3e2621f?w=500",

    "Office Chair":
    "https://images.unsplash.com/photo-1580480055273-228ff5388ef8?w=500"
};

document.getElementById("productImage").src =
productImages[name];

document.getElementById("addToCartBtn")
.addEventListener("click", () => {

    let cart =
    JSON.parse(localStorage.getItem("cart"))
    || [];

    const existingProduct =
    cart.find(item => item.name === name);

    if(existingProduct){

        existingProduct.quantity += 1;

    }else{

        cart.push({
            name:name,
            price:"$"+price,
            quantity:1
        });

    }

    localStorage.setItem(
        "cart",
        JSON.stringify(cart)
    );

    alert(name + " added to cart!");

});

</script>

</body>
</html>
